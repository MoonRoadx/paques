<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chasse aux Œufs Magique</title>
    <style>
        :root { --rose: #ff69b4; --vert: #4caf50; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fffafa; text-align: center; margin: 0; overflow: hidden; touch-action: manipulation; }
        #header { background: var(--rose); color: white; padding: 15px; font-size: 1.2rem; font-weight: bold; position: relative; z-index: 10; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .map-container { position: relative; width: 100vw; height: calc(100vh - 60px); display: flex; justify-content: center; align-items: center; background: #eee; }
        .map-img { max-width: 100%; max-height: 100%; display: block; border-radius: 10px; }

        .spot {
            position: absolute; width: 70px; height: 70px; background: white; border: 4px solid var(--rose);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 35px; transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .pulse { animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim {
            0% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 0 15px rgba(255, 105, 180, 0); }
            100% { transform: translate(-50%, -50%) scale(0.9); }
        }

        .hidden { display: none; }
        .found { background: #bdfcc9; border-color: #2e8b57; animation: none; opacity: 0.7; }

        #photo-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        #hint-img { width: 85%; border: 8px solid white; border-radius: 20px; max-height: 60vh; object-fit: cover; }
        .btn-confirm { margin-top: 20px; padding: 15px 40px; background: var(--vert); color: white; border-radius: 30px; font-size: 1.5rem; border: none; font-weight: bold; }

        #victory { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="header">🏠 Appuie sur l'Étoile !</div>

<div class="map-container">
    <img src="carte.jpg" class="map-img">

    <div id="step0" class="spot pulse" style="top: 45%; left: 45%;" onclick="openPhoto(0, '🐣 Cherche le premier indice !')">⭐</div>
    
    <div id="step1" class="spot hidden" style="top: 30%; left: 38%;" onclick="openPhoto(1, '🌸 Continue vers l\'indice suivant !')">🥚</div>
    
    <div id="step2" class="spot hidden" style="top: 15%; left: 38%;" onclick="openPhoto(2, '🥚 Tu chauffes !')">🥚</div>
    
    <div id="step3" class="spot hidden" style="top: 43%; left: 33%;" onclick="openPhoto(3, '🐰 Trouve le LAPIN caché !')">🐰</div>
    
    <div id="step4" class="spot hidden" style="top: 28%; left: 15%;" onclick="openPhoto(4, '🎁 Presque fini...')">🥚</div>
    
    <div id="step5" class="spot hidden" style="top: 15%; left: 8%;" onclick="openPhoto(5, '🏆 LE TRÉSOR !')">🎁</div>
</div>

<div id="photo-popup">
    <h2 style="color: white;">Cherche ici :</h2>
    <img id="hint-img" src="">
    <button class="btn-confirm" onclick="closePhoto()">J'ai trouvé ! ✅</button>
</div>

<div id="victory">
    <h1 style="color: var(--rose); font-size: 3rem;">BRAVO ! 🎉</h1>
    <div style="font-size: 100px;">🐰🍫🐣</div>
    <button onclick="location.reload()" class="btn-confirm">Recommencer</button>
</div>

<script>
    let currentActiveStep = 0;
    let nextMsgTemp = "";

    function openPhoto(num, nextMsg) {
        document.getElementById('hint-img').src = 'photo' + num + '.jpg';
        document.getElementById('photo-popup').style.display = 'flex';
        currentActiveStep = num;
        nextMsgTemp = nextMsg;
    }

    function closePhoto() {
        document.getElementById('photo-popup').style.display = 'none';
        const current = document.getElementById('step' + currentActiveStep);
        current.classList.remove('pulse');
        current.classList.add('found');

        if (currentActiveStep === 5) {
            document.getElementById('victory').style.display = 'flex';
        } else {
            document.getElementById('header').innerText = nextMsgTemp;
            const next = document.getElementById('step' + (currentActiveStep + 1));
            next.classList.remove('hidden');
            next.classList.add('pulse');
        }
    }
</script>

</body>
</html>
