<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Chasse Magique de Lanha</title>
    <style>
        :root { --rose: #ff69b4; --vert: #4caf50; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fffafa; text-align: center; margin: 0; padding: 0; }
        
        /* Écran d'accueil (Vidéo 1 : Intro) */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 5000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        
        #header { background: var(--rose); color: white; padding: 15px; font-size: 1.2rem; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .map-wrapper { position: relative; display: inline-block; width: 100%; margin: 0 auto; }
        .map-img { width: 100%; height: auto; display: block; }

        .spot {
            position: absolute; width: 60px; height: 60px; background: white; border: 4px solid var(--rose);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .pulse { animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim {
            0% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 0 15px rgba(255, 105, 180, 0); }
            100% { transform: translate(-50%, -50%) scale(0.9); }
        }

        .hidden { display: none; }
        .found { background: #bdfcc9; border-color: #2e8b57; animation: none; opacity: 0.7; }

        /* Popups et Vidéos */
        #photo-popup, #victory { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        video { width: 90%; max-width: 600px; border-radius: 15px; border: 5px solid var(--rose); background: black; }
        #hint-img { width: 85%; border: 8px solid white; border-radius: 20px; max-height: 60vh; object-fit: cover; }
        .btn-confirm { margin-top: 20px; padding: 15px 40px; background: var(--vert); color: white; border-radius: 30px; font-size: 1.5rem; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="intro-screen">
    <h2 style="color: var(--rose); margin-bottom: 15px;">Écoute bien le Lapin... 🐰</h2>
    <video id="vid-intro" controls autoplay>
        <source src="intro.mp4" type="video/mp4">
    </video>
    <button class="btn-confirm" onclick="startHunt()">Voir ma Carte Magique ! 🗺️</button>
</div>

<div id="header">🏠 Appuie sur l'Étoile !</div>

<div class="map-wrapper">
    <img src="carte.jpg" class="map-img">

    <div id="step0" class="spot pulse" style="top: 45%; left: 45%;" onclick="openPhoto(0, '🐣 Cherche le premier indice !')">⭐</div>
    <div id="step1" class="spot hidden" style="top: 34%; left: 22%;" onclick="openPhoto(1, '🌸 Continue vers l\'indice suivant !')">🥚</div>
    <div id="step2" class="spot hidden" style="top: 25%; left: 17%;" onclick="openPhoto(2, '🥚 Tu chauffes !')">🥚</div>
    <div id="step3" class="spot hidden" style="top: 13%; left: 48%;" onclick="openPhoto(3, '🐰 Trouve le LAPIN caché !')">🐰</div>
    <div id="step4" class="spot hidden" style="top: 13%; left: 76%;" onclick="openPhoto(4, '🎁 Presque fini...')">🥚</div>
    <div id="step5" class="spot hidden" style="top: 44%; left: 68%;" onclick="openPhoto(5, '🏆 LE TRÉSOR !')">🎁</div>
</div>

<div id="photo-popup">
    <h2 style="color: white;">Cherche ici :</h2>
    <img id="hint-img" src="">
    <button class="btn-confirm" onclick="closePhoto()">J'ai trouvé ! ✅</button>
</div>

<div id="victory">
    <h2 style="color: white; margin-bottom: 15px;">C'EST GAGNÉ ! 🎉</h2>
    <video id="vid-final" controls>
        <source src="final.mp4" type="video/mp4">
    </video>
    <button class="btn-confirm" onclick="location.reload()" style="background: var(--rose); margin-top: 20px;">Recommencer</button>
</div>

<script>
    let currentActiveStep = 0;
    let nextMsgTemp = "";

    function startHunt() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('vid-intro').pause();
    }

    function openPhoto(num, nextMsg) {
        document.getElementById('hint-img').src = 'photo' + num + '.jpg';
        document.getElementById('photo-popup').style.display = 'flex';
        currentActiveStep = num;
        nextMsgTemp = nextMsg;
    }

    function closePhoto() {
        document.getElementById('photo-popup').style.display = 'none';
        const current = document.getElementById('step' + currentActiveStep);
        current.classList.remove('pulse');
        current.classList.add('found');

        if (currentActiveStep === 5) {
            // Affiche l'écran de victoire avec la vidéo de la cabane
            document.getElementById('victory').style.display = 'flex';
            document.getElementById('vid-final').play();
        } else {
            document.getElementById('header').innerText = nextMsgTemp;
            const next = document.getElementById('step' + (currentActiveStep + 1));
            next.classList.remove('hidden');
            next.classList.add('pulse');
        }
    }
</script>

</body>
</html>
